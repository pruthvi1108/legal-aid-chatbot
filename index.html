<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Aid Chatbot</title>
    <style>
        :root {
            --primary-color: #1A5276;
            --secondary-color: #5DADE2;
            --bg-color: #F8F9F9;
            --text-color: #2C3E50;
            --chat-bg: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 650px;
            height: 80vh;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .user-message {
            background-color: var(--secondary-color);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            background-color: #EBF5FB;
            color: var(--text-color);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .sources {
            font-size: 0.8rem;
            color: #566573;
            margin-top: 5px;
            border-top: 1px dashed #A6ACAF;
            padding-top: 5px;
        }

        .input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #E5E7E9;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #D5D8DC;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #154360;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">⚖️ Legal Aid Chatbot</div>
        <div class="chat-box" id="chatBox">
            <div class="message bot-message">Hello! Ask me anything about your rights. I'm here to help.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask about labor, housing, or family law..." autocomplete="off">
            <button onclick="sendMessage()">Ask</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        const userInput = document.getElementById("userInput");

        // Allow pressing Enter to submit
        userInput.addEventListener("keypress", function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Display User Message
            appendMessage(text, 'user-message');
            userInput.value = "";

            // Display loading state
            const loadingId = appendMessage("Thinking...", 'bot-message');

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });

                // Remove loading message
                document.getElementById(loadingId).remove();

                if (response.ok) {
                    const data = await response.json();
                    let botText = data.answer;
                    
                    if (data.sources && data.sources.length > 0) {
                        botText += `<br><br><div class="sources"><strong>Sources:</strong><br>${data.sources.map(s => `• ${JSON.stringify(s)}`).join('<br>')}</div>`;
                    }
                    
                    appendMessage(botText, 'bot-message', true);
                } else {
                    appendMessage("Error communicating with server.", 'bot-message');
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage("Failed to connect to the server.", 'bot-message');
            }
        }

        function appendMessage(text, className, isHTML = false) {
            const msgDiv = document.createElement("div");
            const id = 'msg-' + Date.now();
            msgDiv.id = id;
            msgDiv.className = `message ${className}`;
            
            if (isHTML) {
                msgDiv.innerHTML = text;
            } else {
                msgDiv.innerText = text;
            }
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
